<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirection We Work Consulting</title>
    <script>
        function redirectToAppropriateHomepage() {
            var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            var isSmallScreen = window.innerWidth <= 768; // Ou window.matchMedia("(max-width: 768px)").matches

            if (isMobile || isSmallScreen) {
                window.location.replace("homepage_mobile_we_work_consulting_premium/code.html");
            } else {
                window.location.replace("homepage_we_work_consulting_premium/code.html");
            }
        }

        redirectToAppropriateHomepage();
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #09090b;
            color: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        p {
            font-size: 1rem;
            opacity: 0.8;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>Redirection en cours vers la bonne version...</p>
    </div>
</body>
</html>
