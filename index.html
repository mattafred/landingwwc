<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WWC | Tactical Navigation & Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');
        :root { --neon: #00f2ff; --dark: #020406; }
        
        html, body { height: 100%; margin: 0; padding: 0; background: var(--dark); overflow: hidden; font-family: 'JetBrains Mono', monospace; }

        #map { 
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1;
            background: #000;
            filter: invert(100%) hue-rotate(180deg) brightness(0.8) contrast(1.2) saturate(0.2);
        }

        .scan-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 2px 100%;
            z-index: 2; pointer-events: none;
        }

        .hud-interface {
            position: relative;
            z-index: 100;
            height: 100vh;
            width: 100vw;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1.5rem;
        }

        .interactive { pointer-events: auto; }

        .glass { 
            background: rgba(5, 10, 15, 0.85); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(0, 242, 255, 0.15); 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
        }

        .marker-pulse {
            width: 14px; height: 14px; background: var(--neon); border-radius: 50%;
            box-shadow: 0 0 20px var(--neon); position: relative;
        }
        .marker-pulse::after {
            content: ''; position: absolute; width: 44px; height: 44px; 
            border: 1px solid var(--neon); border-radius: 50%; left: -15px; top: -15px; 
            animation: ring 2.5s infinite;
        }
        @keyframes ring { 0% { transform: scale(0.4); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }

        .ai-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ai-modal.active { opacity: 1; visibility: visible; transform: translate(-50%, -50%) scale(1); }
        
        .loading-dots:after {
            content: '.';
            animation: dots 1.5s steps(5, end) infinite;
        }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }

        .leaflet-control-attribution { display: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="scan-overlay"></div>

    <!-- HUD Interface -->
    <div class="hud-interface md:p-12">
        
        <div class="flex justify-between items-start">
            <div class="glass p-5 rounded-3xl border-l-4 border-l-cyan-500 interactive">
                <div class="flex items-center gap-2 mb-1">
                    <div class="w-2 h-2 bg-cyan-500 rounded-full animate-pulse shadow-[0_0_10px_#00f2ff]"></div>
                    <span class="text-[9px] font-bold tracking-[0.5em] text-cyan-400 uppercase font-mono">System_Linked</span>
                </div>
                <h1 class="text-3xl font-bold tracking-tighter italic text-white">WWC_NAV.OS</h1>
            </div>
            
            <div class="flex flex-col gap-2 items-end">
                <div class="glass px-6 py-2 rounded-full border border-white/5 interactive">
                    <span id="clock" class="text-[10px] font-bold text-cyan-400 tracking-widest">00:00:00</span>
                </div>
                <button onclick="askStrategicContext()" class="glass px-4 py-2 rounded-xl border border-cyan-500/30 text-[9px] text-cyan-400 hover:bg-cyan-500/10 transition-all interactive font-bold">
                    ✨ ANALYSE STRATÉGIQUE
                </button>
                <button onclick="openMeetingPlanner()" class="glass px-4 py-2 rounded-xl border border-purple-500/30 text-[9px] text-purple-400 hover:bg-purple-500/10 transition-all interactive font-bold">
                    ✨ PLANIFICATEUR RÉUNION
                </button>
            </div>
        </div>

        <!-- Section Centrale -->
        <div class="hidden md:flex justify-center">
            <div id="ai-status-panel" class="glass px-5 py-2 rounded-xl border border-cyan-500/10 opacity-0 transition-opacity duration-500">
                <span class="text-[8px] text-gray-500 uppercase tracking-widest">IA_Consultant:</span>
                <span id="ai-status-text" class="text-[8px] text-cyan-400 ml-2 font-bold uppercase"></span>
            </div>
        </div>

        <div class="md:w-96 space-y-4">
            <!-- ✨ IA Concierge Panel with Audio -->
            <div class="glass p-6 rounded-[2rem] interactive border-t-2 border-t-cyan-500/50">
                <div class="flex justify-between items-center mb-3">
                    <div class="text-[9px] text-cyan-400 font-bold tracking-[0.2em] uppercase">✨ Concierge Vocal</div>
                    <div id="audio-indicator" class="hidden"><div class="w-2 h-2 bg-red-500 rounded-full animate-ping"></div></div>
                </div>
                <div class="flex gap-2">
                    <input type="text" id="ai-input" placeholder="Posez une question..." 
                           class="flex-grow bg-black/40 border border-white/10 rounded-lg px-3 py-2 text-[10px] text-white focus:outline-none focus:border-cyan-500">
                    <button onclick="handleAIChat()" class="bg-cyan-500 text-black px-3 py-2 rounded-lg text-[10px] font-bold hover:bg-white transition-all">OK</button>
                </div>
            </div>

            <!-- Panel Localisation & Navigation -->
            <div class="glass p-8 rounded-[2.5rem] interactive">
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <div class="text-[8px] text-gray-500 uppercase mb-1">Cible_ID</div>
                        <div class="text-xs font-bold text-white tracking-widest uppercase">Berges_du_Lac.TN</div>
                    </div>
                    <div class="text-[8px] text-cyan-500 font-bold font-mono">10.24E / 36.83N</div>
                </div>
                
                <div class="grid grid-cols-1 gap-3">
                    <button onclick="launchNavigation()" class="w-full py-4 bg-white/5 border border-cyan-500/30 text-cyan-400 font-bold text-[10px] tracking-[0.2em] uppercase rounded-xl hover:bg-cyan-500/10 transition-all flex items-center justify-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        Lancer Navigation
                    </button>
                    <button onclick="enterCabinet()" class="w-full py-5 bg-cyan-500 text-black font-bold text-[10px] tracking-[0.2em] uppercase rounded-2xl hover:bg-white transition-all duration-500">
                        Accéder au Site Principal
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal AI -->
    <div id="ai-modal" class="ai-modal glass max-w-md w-[90vw] p-8 rounded-3xl border-2 border-cyan-500/50">
        <div class="flex justify-between items-center mb-6">
            <h2 id="modal-title" class="text-cyan-400 font-bold text-sm tracking-widest uppercase">✨ Réponse IA</h2>
            <button onclick="closeAIModal()" class="text-gray-500 hover:text-white">✕</button>
        </div>
        <div id="ai-modal-content" class="text-[11px] leading-relaxed text-gray-200 font-light space-y-4 max-h-[60vh] overflow-y-auto"></div>
        <div class="mt-8 pt-4 border-t border-white/10 flex justify-between items-center">
            <span class="text-[8px] text-gray-600 uppercase font-mono tracking-tighter">Powered by Gemini 2.5</span>
            <button onclick="closeAIModal()" class="px-4 py-2 border border-white/10 rounded-lg text-[10px] uppercase font-bold hover:bg-white/5">Fermer</button>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const target = [36.835418, 10.242075];
        let map;

        // --- NAVIGATION GPS ---
        function launchNavigation() {
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${target[0]},${target[1]}`, '_blank');
        }

        // --- GEMINI API CALLS ---
        async function callGemini(prompt, systemInstruction) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };
            const response = await fetchWithRetry(url, payload);
            return response.candidates?.[0]?.content?.parts?.[0]?.text;
        }

        async function callGeminiTTS(text) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: text }] }],
                generationConfig: { 
                    responseModalities: ["AUDIO"], 
                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } 
                }
            };
            const result = await fetchWithRetry(url, payload);
            const pcmData = result.candidates[0].content.parts[0].inlineData.data;
            playAudioFromBase64(pcmData);
        }

        async function fetchWithRetry(url, payload, retries = 5) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (response.ok) return await response.json();
                } catch (e) {}
                await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
            }
            throw new Error('API Unavailable');
        }

        // --- AUDIO HELPERS ---
        function playAudioFromBase64(base64Data) {
            const binaryString = atob(base64Data);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
            
            // Convert PCM16 to WAV
            const wavBuffer = createWavHeader(bytes.buffer, 24000); // Kore usually at 24kHz
            const blob = new Blob([wavBuffer], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);
            document.getElementById('audio-indicator').classList.remove('hidden');
            audio.play();
            audio.onended = () => document.getElementById('audio-indicator').classList.add('hidden');
        }

        function createWavHeader(pcmBuffer, sampleRate) {
            const header = new ArrayBuffer(44);
            const view = new DataView(header);
            const pcmView = new Uint8Array(pcmBuffer);
            const length = pcmView.length;

            view.setUint32(0, 0x46464952, true); // "RIFF"
            view.setUint32(4, 36 + length, true);
            view.setUint32(8, 0x45564157, true); // "WAVE"
            view.setUint32(12, 0x20746d66, true); // "fmt "
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // PCM
            view.setUint16(22, 1, true); // Mono
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            view.setUint32(36, 0x61746164, true); // "data"
            view.setUint32(40, length, true);

            const combined = new Uint8Array(44 + length);
            combined.set(new Uint8Array(header), 0);
            combined.set(pcmView, 44);
            return combined.buffer;
        }

        // --- AI FEATURES ---
        async function askStrategicContext() {
            showAIStatus("Synthèse contextuelle...");
            const prompt = "Pourquoi les Berges du Lac sont le hub premium n°1 pour le conseil en Tunisie ? Donne 3 points tactiques.";
            try {
                openAIModal("<div class='loading-dots'>Analyse satellite</div>", "✨ CONTEXTE TACTIQUE");
                const response = await callGemini(prompt, "Tu es un expert en géo-stratégie d'affaires.");
                updateAIModalContent(response);
                callGeminiTTS("Voici l'analyse stratégique de votre emplacement cible.");
                hideAIStatus();
            } catch (err) { updateAIModalContent("Erreur liaison satellite."); }
        }

        async function openMeetingPlanner() {
            const type = prompt("Type de réunion ? (Comptabilité, Conseil IA, Audit, Signature)");
            if (!type) return;
            showAIStatus("Planification en cours...");
            try {
                openAIModal("<div class='loading-dots'>Génération d'agenda</div>", "✨ PLANIFICATEUR DE RÉUNION");
                const response = await callGemini(`Génère un agenda pour une réunion de type '${type}' chez WWC aux Berges du Lac. Suggère aussi un restaurant de luxe proche pour le déjeuner.`, "Tu es un assistant de direction premium.");
                updateAIModalContent(response);
                callGeminiTTS("L'agenda de votre réunion a été optimisé par l'intelligence artificielle.");
                hideAIStatus();
            } catch (err) { updateAIModalContent("Erreur planification."); }
        }

        async function handleAIChat() {
            const input = document.getElementById('ai-input');
            const userMsg = input.value.trim();
            if (!userMsg) return;
            input.value = "";
            showAIStatus("Consultation IA...");
            try {
                openAIModal("<div class='loading-dots'>IA en réflexion</div>", "✨ CONCIERGE VOCAL");
                const response = await callGemini(userMsg, "Tu es le concierge virtuel de WWC. Style direct, poli, technologique.");
                updateAIModalContent(response);
                callGeminiTTS(response.substring(0, 150)); // TTS on the first part
                hideAIStatus();
            } catch (err) { updateAIModalContent("Flux IA rompu."); }
        }

        // --- UI HELPERS ---
        function openAIModal(initialContent, title) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('ai-modal-content').innerHTML = initialContent;
            document.getElementById('ai-modal').classList.add('active');
        }
        function closeAIModal() { document.getElementById('ai-modal').classList.remove('active'); }
        function updateAIModalContent(text) { document.getElementById('ai-modal-content').innerHTML = text.replace(/\n/g, '<br>'); }
        function showAIStatus(text) {
            document.getElementById('ai-status-text').textContent = text;
            document.getElementById('ai-status-panel').classList.remove('opacity-0');
        }
        function hideAIStatus() { document.getElementById('ai-status-panel').classList.add('opacity-0'); }
        function enterCabinet() {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.6s ease';
            setTimeout(() => { window.location.href = 'home.html'; }, 600);
        }

        window.addEventListener('load', () => {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView(target, 16);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            const icon = L.divIcon({ className: 'custom-marker', html: '<div class="marker-pulse"></div>', iconSize: [44, 44], iconAnchor: [22, 22] });
            L.marker(target, { icon }).addTo(map);
            setTimeout(() => { map.invalidateSize(); }, 300);
        });

        setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString('fr-FR', { hour12: false }); }, 1000);
    </script>
</body>
</html>
