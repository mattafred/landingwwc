<!DOCTYPE html>
<html lang="fr">

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; }
        
        /* Custom scrollbar for dark theme */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #ef4444; }

            background: linear-gradient(to right, #ef4444, #991b1b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            background: #ef4444;
            border-radius: 0;

<body>
    <div id="root"></div>

    <script type="text/babel">

            useEffect(() => {
                const multiplier = taxProfile === 'onshore' ? 0.08 : taxProfile === 'offshore' ? 0.15 : 0.25;

            return (
                <div className="min-h-screen text-white overflow-x-hidden flex flex-col">

                            <div className="relative bg-neutral-900/50 backdrop-blur-xl border border-white/10 p-5 md:p-8 rounded-none shadow-2xl overflow-hidden">
                                <div className="flex justify-between items-center mb-8 md:mb-10 border-b border-white/5 pb-6">
                                    <div className="text-left">
                                        <h3 className="text-[8px] md:text-[9px] text-neutral-500 font-black uppercase tracking-widest mb-1">Status Compliance (TN)</h3>
                                        <p className="text-2xl md:text-4xl font-black text-emerald-400 tracking-tighter">99.8%</p>
                                    </div>
                                    <div className="text-right">
                                        <h3 className="text-[8px] md:text-[9px] text-neutral-500 font-black uppercase tracking-widest mb-1">Optimisation</h3>
                                        <p className="text-2xl md:text-4xl font-black text-red-500 tracking-tighter">-22.5%</p>
                                    </div>
                                </div>
                                
                                <div className="space-y-4 md:space-y-6 mb-8 md:mb-10 text-left">
                                    <div className="p-3 md:p-4 bg-white/5 border-l-2 border-red-600">
                                        <div className="flex justify-between items-end mb-2">

                                    </div>
                                    <div className="p-3 md:p-4 bg-white/5 border-l-2 border-emerald-500">
                                        <div className="flex justify-between items-end mb-2">

                                            <div className="h-full bg-emerald-500 w-[92%]"></div>

                                </div>

                                    <div>

                                            "Art. 14 LF2026 détecté. Économie latente : 14,500 TND."
                                        </p>
                                    </div>
                                </div>
                            </div>

                                <p className="text-neutral-500 font-bold uppercase text-[10px] tracking-widest">Vos fronts de défense stratégique.</p>
                            </div>
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-0 border border-black/10">
                                <div className="p-8 md:p-12 border-b lg:border-b-0 lg:border-r border-black/10 hover:bg-neutral-50 transition-colors group text-left">
                                    <div className="mb-8 text-black group-hover:text-red-600 transition-colors"><IconScale /></div>
                                    <h3 className="text-xl md:text-2xl font-black uppercase tracking-tighter mb-4">Front Tunisie</h3>

                                        Maîtrise du code IRPP/IS et circulaires DGI. Gestion rigoureuse de la liasse fiscale et de la conformité sociale pour une sécurité totale.
                                    </p>
                                </div>
                                <div className="p-8 md:p-12 border-b lg:border-b-0 lg:border-r border-black/10 hover:bg-neutral-50 transition-colors group text-left">

                                    <h3 className="text-xl md:text-2xl font-black uppercase tracking-tighter mb-4">Export & Offshore</h3>

                                    </p>
                                </div>
                                <div className="p-8 md:p-12 hover:bg-neutral-50 transition-colors group text-left">
                                    <div className="mb-8 text-black group-hover:text-red-600 transition-colors"><IconCpu /></div>
                                    <h3 className="text-xl md:text-2xl font-black uppercase tracking-tighter mb-4">Audit IA</h3>
                                    <p className="text-neutral-600 text-sm leading-relaxed font-medium">

                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Simulator - Responsive design */}
                    <section id="simulator" className="py-24 md:py-32 px-4 md:px-6 max-w-6xl mx-auto">
                        <div className="text-center mb-16 md:mb-20">
                            <h2 className="text-3xl md:text-5xl lg:text-6xl font-black uppercase tracking-tighter mb-4 italic">Votre rentabilité est mal <br/> <span className="text-red-600">Configurée.</span></h2>

                        </div>
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-20 items-center">
                            <div className="space-y-10">
                                <div className="space-y-8">

                                            <span>Chiffre d'Affaires</span>
                                            <span className="text-white">{revenue.toLocaleString()} €</span>
                                        </div>
                                        <input 
                                            type="range" 
                                            min="100000" 
                                            max="5000000" 
                                            step="50000"
                                            value={revenue}
                                            onChange={(e) => setRevenue(parseInt(e.target.value))}
                                            className="w-full h-1.5 bg-neutral-800 appearance-none cursor-pointer accent-red-600"
                                        />
                                    </div>
                                    <div className="text-left">

                                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-2">
                                            {['onshore', 'offshore', 'international'].map((type) => (
                                                <button 
                                                    key={type}
                                                    onClick={() => setTaxProfile(type)}
                                                    className={`py-3 md:py-4 text-[9px] font-black uppercase tracking-widest border transition-all duration-300 ${taxProfile === type ? 'bg-red-600 border-red-600 text-white shadow-lg shadow-red-600/20' : 'border-white/10 text-neutral-500 hover:border-white/30'}`}
                                                >
                                                    {type}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="relative">
                                <div className="absolute -inset-1 bg-red-600 blur opacity-10"></div>

                                    <p className="text-5xl md:text-7xl lg:text-8xl font-black tracking-tighter mb-4 md:mb-8 leading-none">

                                    <li className="hover:text-white transition-colors cursor-pointer">IP Box Structures</li>

</body>
