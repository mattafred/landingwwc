<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WWC | Tactical Navigation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');
        :root { --neon: #00f2ff; --dark: #020406; }
        
        /* Reset Structurel pour forcer l'affichage Leaflet */
        html, body { height: 100%; margin: 0; padding: 0; background: var(--dark); overflow: hidden; font-family: 'JetBrains Mono', monospace; }

        /* Calque 0 : La Carte (Fond Total) */
        #map { 
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1;
            background: #000;
            filter: invert(100%) hue-rotate(180deg) brightness(0.8) contrast(1.2) saturate(0.2);
        }

        /* Calque 1 : Filtres Visuels (Scanlines) */
        .scan-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 2px 100%;
            z-index: 2; pointer-events: none;
        }

        /* Calque 2 : Interface HUD (Surface) */
        .hud-interface {
            position: relative;
            z-index: 100;
            height: 100vh;
            width: 100vw;
            pointer-events: none; /* Laisse passer le drag sur la carte */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1.5rem;
        }

        .interactive { pointer-events: auto; } /* Active les clics sur les boutons */

        .glass { 
            background: rgba(5, 10, 15, 0.85); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(0, 242, 255, 0.15); 
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
        }

        /* Animation du Marqueur Radar */
        .marker-pulse {
            width: 14px; height: 14px; background: var(--neon); border-radius: 50%;
            box-shadow: 0 0 20px var(--neon); position: relative;
        }
        .marker-pulse::after {
            content: ''; position: absolute; width: 44px; height: 44px; 
            border: 1px solid var(--neon); border-radius: 50%; left: -15px; top: -15px; 
            animation: ring 2.5s infinite;
        }
        @keyframes ring { 0% { transform: scale(0.4); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }

        .leaflet-control-attribution { display: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="scan-overlay"></div>

    <div class="hud-interface md:p-12">
        
        <div class="flex justify-between items-start">
            <div class="glass p-5 rounded-3xl border-l-4 border-l-cyan-500 interactive">
                <div class="flex items-center gap-2 mb-1">
                    <div class="w-2 h-2 bg-cyan-500 rounded-full animate-pulse shadow-[0_0_10px_#00f2ff]"></div>
                    <span class="text-[9px] font-bold tracking-[0.5em] text-cyan-400 uppercase">System_Linked</span>
                </div>
                <h1 class="text-3xl font-bold tracking-tighter italic text-white">WWC_NAV.OS</h1>
            </div>
            
            <div class="glass px-6 py-2 rounded-full border border-white/5 interactive">
                <span id="clock" class="text-[10px] font-bold text-cyan-400 tracking-widest">00:00:00</span>
            </div>
        </div>

        <div class="hidden md:flex justify-center">
            <div class="glass px-5 py-2 rounded-xl border border-cyan-500/10">
                <span class="text-[8px] text-gray-500 uppercase tracking-widest">Data_Stream:</span>
                <span class="text-[8px] text-green-500 ml-2 font-bold animate-pulse">ENCRYPTED_LINK_ACTIVE</span>
            </div>
        </div>

        <div class="md:w-85 space-y-4">
            <div class="glass p-8 rounded-[2.5rem] interactive">
                <div class="flex justify-between items-end mb-8">
                    <div>
                        <div class="text-[8px] text-gray-500 uppercase mb-1">Cible_ID</div>
                        <div class="text-xs font-bold text-white tracking-widest uppercase">Berges_du_Lac.TN</div>
                    </div>
                    <div class="text-[8px] text-cyan-500 font-bold font-mono">10.24E / 36.83N</div>
                </div>
                
                <button onclick="enterCabinet()" class="w-full py-5 bg-cyan-500 text-black font-bold text-[10px] tracking-[0.2em] uppercase rounded-2xl hover:bg-white transition-all duration-500 shadow-[0_15px_35px_rgba(0,242,255,0.4)]">
                    Accéder au Site Principal
                </button>
            </div>
        </div>
    </div>

    <script>
        // Coordonnées cibles
        const target = [36.835418, 10.242075];
        let map;

        function enterCabinet() {
            // Animation de sortie immersive
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.6s ease';
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 600);
        }

        window.addEventListener('load', () => {
            // Initialisation Map
            map = L.map('map', { 
                zoomControl: false, 
                attributionControl: false,
                dragging: true,
                touchZoom: true
            }).setView(target, 16);

            // Tiles (CartoDB Dark Matter - Haute fiabilité)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19
            }).addTo(map);
            
            // Marqueur Custom Radar
            const customIcon = L.divIcon({
                className: 'custom-marker',
                html: '<div class="marker-pulse"></div>',
                iconSize: [44, 44],
                iconAnchor: [22, 22]
            });
            L.marker(target, { icon: customIcon }).addTo(map);

            // Correction de taille forcée pour éviter le gris/noir au chargement
            setTimeout(() => { map.invalidateSize(); }, 300);
        });

        // Horloge temps réel
        setInterval(() => {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('fr-FR', { hour12: false });
        }, 1000);
    </script>
</body>
</html>
