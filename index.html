<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="We Work Consulting - Expertise Comptable, Audit et Commissariat aux Comptes en Tunisie et International.">
    <title>WE WORK CONSULTING | Expertise Comptable & Commissariat aux Comptes</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --wwc-grey: #595959;
            --wwc-lime: #A3E635;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #ffffff;
            color: var(--wwc-grey);
            scroll-behavior: smooth;
        }
        
        .bg-wwc-grey { background-color: var(--wwc-grey); }
        .text-wwc-grey { color: var(--wwc-grey); }
        .bg-wwc-lime { background-color: var(--wwc-lime); }
        .text-wwc-lime { color: var(--wwc-lime); }
        .border-wwc-lime { border-color: var(--wwc-lime); }

        .hover-lift { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .hover-lift:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #e5e7eb;
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: var(--wwc-lime);
            cursor: pointer;
            border-radius: 50%;
            border: 3px solid var(--wwc-grey);
        }

        /* Amélioration de l'aspect visuel du logo PNG */
        .logo-container img {
            max-width: 180px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const IconCheck = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>;
        const IconGlobe = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9h18"></path></svg>;

        const App = () => {
            const [revenue, setRevenue] = useState(1000000);
            const [savings, setSavings] = useState(0);
            const [isScrolled, setIsScrolled] = useState(false);

            useEffect(() => {
                setSavings(Math.round(revenue * 0.12));
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, [revenue]);

            return (
                <div className="flex flex-col min-h-screen">
                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 ${isScrolled ? 'bg-white shadow-xl py-3' : 'bg-transparent py-6'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-3 logo-container">
                                <img 
                                    src="logowwc.png" 
                                    className="h-10 md:h-14 w-auto object-contain transition-all" 
                                    alt="Logo We Work Consulting"
                                    onError={(e) => {
                                        e.target.style.display = 'none';
                                        e.target.nextSibling.style.display = 'flex';
                                    }}
                                />
                                <div className="hidden flex-col leading-none font-extrabold uppercase" style={{display: 'none'}}>
                                    <span className="text-[#595959] text-sm md:text-lg">WE WORK</span>
                                    <span className="text-[#A3E635] text-sm md:text-lg">CONSULTING</span>
                                </div>
                            </div>
                            
                            <div className="hidden lg:flex items-center gap-10 font-bold text-[11px] uppercase tracking-[0.2em] text-wwc-grey text-left">
                                <a href="#expertise" className="hover:text-wwc-lime transition-colors uppercase">Expertises</a>
                                <a href="#valeurs" className="hover:text-wwc-lime transition-colors uppercase">Valeurs</a>
                                <a href="#simulator" className="hover:text-wwc-lime transition-colors uppercase">Optimisation</a>
                                <button className="bg-wwc-grey text-white px-8 py-3 hover:bg-black transition-all shadow-lg font-black text-[10px] tracking-widest">
                                    CONTACT
                                </button>
                            </div>
                            
                            <button className="lg:hidden text-wwc-grey p-2">
                                <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                            </button>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="relative pt-48 pb-24 md:pt-64 md:pb-48 px-6 bg-[#fafafa] overflow-hidden text-left">
                        <div className="max-w-7xl mx-auto relative z-10">
                            <div className="max-w-4xl text-left">
                                <h1 className="text-5xl md:text-8xl font-black text-wwc-grey leading-[1] mb-10 uppercase tracking-tighter text-left">
                                    L'Expertise qui <br/>
                                    <span className="text-wwc-lime">Propulse</span> <br/> votre Ambition.
                                </h1>
                                <p className="text-lg md:text-2xl text-neutral-500 mb-12 leading-relaxed max-w-2xl font-medium text-left">
                                    Plus qu'un cabinet comptable : une <span className="text-wwc-grey font-bold italic">architecture de croissance</span> pour les entrepreneurs qui ne laissent rien au hasard.
                                </p>
                                <div className="flex flex-col sm:flex-row gap-6">
                                    <button className="bg-wwc-lime text-wwc-grey px-12 py-5 font-black text-xs uppercase tracking-[0.3em] hover:bg-black hover:text-white transition-all shadow-2xl shadow-wwc-lime/30">
                                        Demander un Audit
                                    </button>
                                    <button className="border-2 border-wwc-grey text-wwc-grey px-12 py-5 font-black text-xs uppercase tracking-[0.3em] hover:bg-wwc-grey hover:text-white transition-all">
                                        Nos Services
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div className="absolute top-0 right-0 w-1/2 h-full bg-[#f4fce3] -skew-x-12 translate-x-48 z-0 hidden lg:block opacity-50"></div>
                    </section>

                    {/* Expertise Section */}
                    <section id="expertise" className="py-32 px-6 bg-white">
                        <div className="max-w-7xl mx-auto text-left">
                            <div className="flex flex-col md:flex-row justify-between items-end mb-24 gap-8">
                                <div className="text-left">
                                    <h2 className="text-4xl md:text-6xl font-black text-wwc-grey mb-4 uppercase tracking-tighter italic text-left">Ingénierie de Précision.</h2>
                                    <div className="w-32 h-2 bg-wwc-lime"></div>
                                </div>
                                <p className="text-neutral-400 font-bold uppercase text-[10px] tracking-[0.5em] text-left lg:text-right">Tunisie & Global Markets</p>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12">
                                {[
                                    { title: "Expertise Comptable", desc: "Tenue, surveillance et établissement de vos états financiers aux normes nationales et IFRS." },
                                    { title: "Audit & Légal", desc: "Commissariat aux comptes et audits contractuels pour sécuriser vos investisseurs." },
                                    { title: "Conseil Fiscal", desc: "Optimisation chirurgicale et assistance lors des contrôles pour protéger votre cash." },
                                    { title: "International", desc: "Accompagnement des investisseurs étrangers et structuration de flux transfrontaliers." }
                                ].map((item, index) => (
                                    <div key={index} className="p-10 border border-neutral-100 bg-white hover-lift text-left flex flex-col h-full shadow-sm">
                                        <div className="w-14 h-14 bg-wwc-lime text-black flex items-center justify-center mb-8 shadow-lg">
                                            <IconCheck />
                                        </div>
                                        <h3 className="text-xl font-black text-wwc-grey mb-6 uppercase tracking-tight text-left">{item.title}</h3>
                                        <p className="text-neutral-500 text-sm leading-relaxed mb-8 flex-grow font-medium text-left">{item.desc}</p>
                                        <a href="#" className="text-wwc-lime font-black text-[10px] uppercase tracking-[0.2em] flex items-center gap-3 hover:gap-6 transition-all group">
                                            Détails <span className="group-hover:translate-x-1 transition-transform">→</span>
                                        </a>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Valeurs / Mirror Section */}
                    <section id="valeurs" className="py-32 bg-wwc-grey text-white px-6 relative overflow-hidden">
                        <div className="max-w-7xl mx-auto flex flex-col lg:flex-row gap-24 items-center">
                            <div className="lg:w-1/2 text-left relative z-10">
                                <h2 className="text-5xl md:text-7xl font-black mb-12 leading-[0.9] uppercase tracking-tighter text-left">
                                    Zéro Bruit. <br/> <span className="text-wwc-lime italic">Que du Résultat.</span>
                                </h2>
                                <div className="space-y-10">
                                    {[
                                        "Réactivité chirurgicale : Une réponse sous 24h.",
                                        "Expertise biculturelle : Maîtrise des enjeux locaux et globaux.",
                                        "Technologie intégrée : Pilotage de votre data en temps réel.",
                                        "Transparence totale : Honoraires clairs et sans surprises."
                                    ].map((val, i) => (
                                        <div key={i} className="flex items-start gap-6 group text-left">
                                            <div className="mt-1 text-wwc-lime group-hover:scale-125 transition-transform shrink-0"><IconCheck /></div>
                                            <p className="text-xl font-bold opacity-90 text-left">{val}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="lg:w-1/2 w-full grid grid-cols-2 gap-6 relative z-10">
                                <div className="bg-white/5 aspect-square flex flex-col items-center justify-center border border-white/10 hover:bg-white/10 transition-colors">
                                    <span className="text-6xl font-black text-wwc-lime mb-2 tracking-tighter">+150</span>
                                    <span className="text-[10px] uppercase font-black tracking-[0.3em] opacity-40">Clients Actifs</span>
                                </div>
                                <div className="bg-white/10 aspect-square flex flex-col items-center justify-center">
                                    <span className="text-6xl font-black text-white mb-2 tracking-tighter">10+</span>
                                    <span className="text-[10px] uppercase font-black tracking-[0.3em] opacity-40 text-center uppercase tracking-tighter">Années d'Expertise</span>
                                </div>
                                <div className="bg-white/10 aspect-square flex flex-col items-center justify-center">
                                    <IconGlobe />
                                    <span className="text-[10px] uppercase font-black tracking-[0.3em] mt-6 opacity-40 text-center uppercase tracking-tighter">Présence Globale</span>
                                </div>
                                <div className="bg-wwc-lime text-wwc-grey aspect-square flex flex-col items-center justify-center shadow-2xl text-center">
                                    <span className="text-5xl font-black mb-2 leading-none text-center italic tracking-tighter uppercase">Audit <br/> Ready</span>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Simulator */}
                    <section id="simulator" className="py-32 px-6 max-w-6xl mx-auto">
                        <div className="bg-[#f9f9f9] p-12 md:p-24 border border-neutral-100 shadow-2xl text-left">
                            <div className="text-left mb-20">
                                <h2 className="text-4xl md:text-6xl font-black text-wwc-grey mb-6 uppercase tracking-tighter italic text-left">Optimisation Immédiate.</h2>
                                <p className="text-neutral-400 font-bold uppercase text-[10px] tracking-[0.5em] text-left">Mesurez votre potentiel caché.</p>
                            </div>
                            
                            <div className="grid lg:grid-cols-2 gap-20 items-center">
                                <div className="space-y-12 text-left">
                                    <div className="text-left">
                                        <div className="flex justify-between text-[11px] font-black uppercase text-neutral-400 mb-6 tracking-[0.3em] text-left">
                                            <span>Chiffre d'Affaires Annuel</span>
                                            <span className="text-wwc-grey text-lg font-bold">{revenue.toLocaleString()} €</span>
                                        </div>
                                        <input 
                                            type="range" 
                                            min="100000" 
                                            max="10000000" 
                                            step="100000"
                                            value={revenue}
                                            onChange={(e) => setRevenue(parseInt(e.target.value))}
                                        />
                                    </div>
                                    <div className="p-8 bg-white border-l-8 border-wwc-lime italic text-base text-neutral-500 font-medium text-left">
                                        "Une structuration adaptée permet de réduire votre pression fiscale de 15% en moyenne dès le premier exercice."
                                    </div>
                                </div>
                                <div className="bg-wwc-lime p-12 text-wwc-grey text-center shadow-2xl relative overflow-hidden text-center">
                                    <h3 className="text-[11px] font-black uppercase tracking-[0.4em] mb-10 opacity-40 uppercase tracking-widest text-center">Gain Potentiel Annuel</h3>
                                    <p className="text-6xl md:text-8xl font-black mb-12 tracking-tighter leading-none text-center">
                                        {savings.toLocaleString()} <span className="text-2xl uppercase">€</span>
                                    </p>
                                    <button className="bg-wwc-grey text-white w-full py-6 font-black text-xs uppercase tracking-[0.3em] hover:bg-black transition-all">
                                        Réclamer mon Diagnostic
                                    </button>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="bg-white border-t border-neutral-50 pt-32 pb-16 px-6 text-wwc-grey">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-20 mb-24 text-left">
                            <div className="flex flex-col items-start text-left">
                                <img src="logowwc.png" className="h-12 w-auto object-contain mb-10" alt="WWC Logo" />
                                <p className="text-[10px] text-neutral-400 font-bold uppercase leading-loose tracking-[0.3em] text-left">
                                    Immeuble le Grand Large<br/>
                                    Berges du Lac 2, Tunis<br/>
                                    Tunisie
                                </p>
                            </div>
                            <div className="text-left">
                                <h4 className="font-black text-[11px] uppercase tracking-[0.4em] mb-10 text-wwc-lime text-left">Services Stratégiques</h4>
                                <ul className="text-[11px] text-neutral-400 font-bold space-y-5 uppercase tracking-[0.2em] text-left">
                                    <li className="hover:text-wwc-grey cursor-pointer transition-colors text-left">Expertise Comptable</li>
                                    <li className="hover:text-wwc-grey cursor-pointer transition-colors text-left">Audit & Commissariat</li>
                                    <li className="hover:text-wwc-grey cursor-pointer transition-colors text-left">Conseil Fiscalité</li>
                                    <li className="hover:text-wwc-grey cursor-pointer transition-colors text-left">Business Legal</li>
                                </ul>
                            </div>
                            <div className="text-left">
                                <h4 className="font-black text-[11px] uppercase tracking-[0.4em] mb-10 text-wwc-lime text-left">Liaison Directe</h4>
                                <ul className="text-[11px] text-neutral-400 font-bold space-y-5 uppercase tracking-[0.2em] text-left">
                                    <li className="text-left">T +216 71 000 000</li>
                                    <li className="text-left">M contact@wework-consulting.xyz</li>
                                    <li className="text-wwc-grey underline cursor-pointer text-left">RDV Stratégique</li>
                                </ul>
                            </div>
                            <div className="text-left">
                                <h4 className="font-black text-[11px] uppercase tracking-[0.4em] mb-10 text-wwc-lime text-left">Newsletter Pro</h4>
                                <p className="text-[10px] text-neutral-400 mb-6 uppercase font-bold tracking-widest text-left">Veille fiscale & stratégique.</p>
                                <div className="flex border-b-2 border-wwc-grey pb-3 text-left">
                                    <input type="email" placeholder="Email" className="bg-transparent text-[11px] uppercase font-black w-full outline-none placeholder:text-neutral-300 text-left" />
                                    <button className="text-wwc-lime font-black ml-4">OK</button>
                                </div>
                            </div>
                        </div>
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center pt-16 border-t border-neutral-50 gap-8 text-center">
                            <p className="text-[9px] font-black text-neutral-300 uppercase tracking-[0.6em]">
                                &copy; 2026 We Work Consulting — Excellence in Every Audit.
                            </p>
                            <div className="flex gap-12 text-[9px] font-black uppercase tracking-[0.4em] text-neutral-300">
                                <a href="#" className="hover:text-wwc-lime">Légal</a>
                                <a href="#" className="hover:text-wwc-lime">Confidentialité</a>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
