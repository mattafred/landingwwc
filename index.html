<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WWC | Prestige Navigation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');
        :root { --neon: #00f2ff; --dark: #010203; --onyx: rgba(5, 7, 10, 0.9); }
        
        html, body { height: 100%; margin: 0; padding: 0; background: var(--dark); overflow: hidden; font-family: 'JetBrains Mono', monospace; }

        /* Moteur de carte en fond total */
        #map { 
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1;
            background: #000;
            filter: grayscale(1) invert(1) brightness(0.6) contrast(1.3);
        }

        /* Scanline subtile */
        .vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8) 100%);
            z-index: 2; pointer-events: none;
        }

        .hud-interface {
            position: relative;
            z-index: 100;
            height: 100vh;
            width: 100vw;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
        }

        .interactive { pointer-events: auto; }

        .glass-panel { 
            background: var(--onyx); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Marqueur Minimaliste */
        .marker-aim {
            width: 20px; height: 20px; border: 1px solid var(--neon);
            position: relative; border-radius: 2px;
            animation: rotate 4s linear infinite;
        }
        .marker-aim::before {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 4px; height: 4px; background: var(--neon);
            transform: translate(-50%, -50%);
        }
        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(90deg); } }

        .leaflet-control-attribution { display: none !important; }
        
        .btn-action {
            @apply transition-all duration-500 uppercase font-bold text-[10px] tracking-[0.3em] rounded-sm;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="vignette"></div>

    <div class="hud-interface md:p-16">
        
        <!-- TOP : Identité & Chrono -->
        <div class="flex justify-between items-start">
            <div class="glass-panel p-8 interactive border-t-2 border-t-cyan-500">
                <div class="text-[9px] text-cyan-500 mb-2 font-bold tracking-[0.5em] uppercase">Status: Sécurisé</div>
                <h1 class="text-4xl font-bold tracking-tighter text-white">WWC_NAV</h1>
                <div class="mt-4 flex gap-4 text-[8px] text-gray-500 uppercase tracking-widest">
                    <span>Tunis_Sector</span>
                    <span>/</span>
                    <span id="clock">00:00:00</span>
                </div>
            </div>
            
            <div class="hidden md:block glass-panel p-4 text-[8px] text-gray-400 tracking-tighter uppercase leading-loose interactive">
                Système de guidage v3.0<br>
                Précision: 0.001m<br>
                Protocole: Militaire
            </div>
        </div>

        <!-- BOTTOM : Actions Critiques -->
        <div class="flex flex-col md:flex-row justify-between items-end gap-6">
            
            <!-- Coordonnées & Localisation -->
            <div class="glass-panel p-8 md:w-96 interactive">
                <div class="mb-8">
                    <div class="text-[9px] text-gray-500 uppercase tracking-[0.3em] mb-2">Destination</div>
                    <div class="text-xl font-bold text-white tracking-tight">Berges du Lac 1, Tunis</div>
                </div>
                
                <div class="flex flex-col gap-3">
                    <button onclick="launchNavigation()" class="btn-action w-full py-4 border border-white/10 text-white hover:bg-white hover:text-black">
                        Lancer l'itinéraire
                    </button>
                    <button onclick="enterCabinet()" class="btn-action w-full py-5 bg-cyan-500 text-black hover:bg-cyan-400 shadow-lg shadow-cyan-500/20">
                        Accéder au site principal
                    </button>
                </div>
            </div>

            <!-- Metadata de vol (Esthétique) -->
            <div class="hidden md:block glass-panel p-6 text-right interactive">
                <div class="text-[8px] text-cyan-500/50 mb-1 font-bold">TELEMETRY_LINK</div>
                <div class="text-[7px] text-gray-600 font-mono">
                    COORD_A: 36.835418<br>
                    COORD_B: 10.242075<br>
                    SIGNAL: OPTIMAL
                </div>
            </div>

        </div>
    </div>

    <script>
        const target = [36.835418, 10.242075];
        let map;

        function launchNavigation() {
            window.open(`https://www.google.com/maps/dir/?api=1&destination=${target[0]},${target[1]}`, '_blank');
        }

        function enterCabinet() {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.8s ease';
            setTimeout(() => { window.location.href = 'home.html'; }, 800);
        }

        window.addEventListener('load', () => {
            map = L.map('map', { 
                zoomControl: false, 
                attributionControl: false,
                dragging: true,
                touchZoom: true
            }).setView(target, 16);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19
            }).addTo(map);
            
            const customIcon = L.divIcon({
                className: 'custom-marker',
                html: '<div class="marker-aim"></div>',
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });
            L.marker(target, { icon: customIcon }).addTo(map);

            setTimeout(() => { map.invalidateSize(); }, 300);
        });

        setInterval(() => {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('fr-FR', { hour12: false });
        }, 1000);
    </script>
</body>
</html>
