<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WE WORK CONSULTING | Expertise Comptable & Commissariat aux Comptes</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --wwc-grey: #595959;
            --wwc-lime: #A3E635;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #ffffff;
            color: var(--wwc-grey);
        }
        
        .bg-wwc-grey { background-color: var(--wwc-grey); }
        .text-wwc-grey { color: var(--wwc-grey); }
        .bg-wwc-lime { background-color: var(--wwc-lime); }
        .text-wwc-lime { color: var(--wwc-lime); }
        .border-wwc-lime { border-color: var(--wwc-lime); }

        .hover-lift { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .hover-lift:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #e5e7eb;
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            background: var(--wwc-lime);
            cursor: pointer;
            border-radius: 50%;
            border: 3px solid var(--wwc-grey);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const IconCheck = () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>;
        const IconGlobe = () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9h18"></path></svg>;

        const App = () => {
            const [revenue, setRevenue] = useState(1000000);
            const [savings, setSavings] = useState(0);
            const [isScrolled, setIsScrolled] = useState(false);

            useEffect(() => {
                setSavings(Math.round(revenue * 0.12));
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, [revenue]);

            return (
                <div className="flex flex-col min-h-screen">
                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-300 ${isScrolled ? 'bg-white shadow-md py-3' : 'bg-transparent py-5'}`}>
                        <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                {/* LOGO ACTUALISÉ EN JPG */}
                                <img 
                                    src="logowwc.jpg" 
                                    className="h-10 md:h-14 w-auto object-contain" 
                                    alt="Logo We Work Consulting"
                                    onError={(e) => {
                                        // Fallback visuel si le fichier est manquant au déploiement
                                        e.target.style.display = 'none';
                                        e.target.nextSibling.style.display = 'flex';
                                    }}
                                />
                                <div className="hidden flex-col leading-none font-bold uppercase" style={{display: 'none'}}>
                                    <span className="text-[#595959] text-sm md:text-lg">WE WORK</span>
                                    <span className="text-[#A3E635] text-sm md:text-lg">CONSULTING</span>
                                </div>
                            </div>
                            
                            <div className="hidden lg:flex items-center gap-8 font-semibold text-sm uppercase tracking-wider text-wwc-grey">
                                <a href="#expertise" className="hover:text-wwc-lime transition-colors text-left">Expertises</a>
                                <a href="#valeurs" className="hover:text-wwc-lime transition-colors text-left">Valeurs</a>
                                <a href="#simulator" className="hover:text-wwc-lime transition-colors text-left">Optimisation</a>
                                <button className="bg-wwc-grey text-white px-6 py-2 hover:bg-black transition-all font-bold">
                                    Contact
                                </button>
                            </div>
                            
                            <button className="lg:hidden text-wwc-grey">
                                <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                            </button>
                        </div>
                    </nav>

                    {/* Hero Section */}
                    <section className="relative pt-40 pb-24 md:pt-56 md:pb-40 px-6 bg-neutral-50 overflow-hidden text-left">
                        <div className="max-w-7xl mx-auto relative z-10">
                            <div className="max-w-3xl">
                                <h1 className="text-5xl md:text-7xl font-extrabold text-wwc-grey leading-[1.1] mb-8">
                                    L'Expertise qui <br/>
                                    <span className="text-wwc-lime">Propulse</span> votre Ambition.
                                </h1>
                                <p className="text-lg md:text-xl text-neutral-500 mb-10 leading-relaxed max-w-2xl italic">
                                    Cabinet d'expertise comptable et de commissariat aux comptes. Nous sécurisons vos opérations en Tunisie et structurons votre croissance à l'international.
                                </p>
                                <div className="flex flex-wrap gap-4">
                                    <button className="bg-wwc-lime text-wwc-grey px-10 py-4 font-bold text-sm uppercase tracking-widest hover:bg-black hover:text-white transition-all shadow-lg shadow-wwc-lime/20">
                                        Demander un Audit
                                    </button>
                                    <button className="border-2 border-wwc-grey text-wwc-grey px-10 py-4 font-bold text-sm uppercase tracking-widest hover:bg-wwc-grey hover:text-white transition-all">
                                        Nos Services
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div className="absolute top-0 right-0 w-1/2 h-full bg-[#f8fcf0] -skew-x-12 translate-x-32 z-0 hidden lg:block"></div>
                    </section>

                    {/* Expertise Section */}
                    <section id="expertise" className="py-24 md:py-32 px-6">
                        <div className="max-w-7xl mx-auto">
                            <div className="text-center mb-20">
                                <h2 className="text-3xl md:text-5xl font-extrabold text-wwc-grey mb-4 italic">Nos Domaines d'Intervention</h2>
                                <div className="w-20 h-1.5 bg-wwc-lime mx-auto"></div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                                {[
                                    { title: "Expertise Comptable", desc: "Tenue, surveillance et établissement de vos états financiers aux normes nationales et IFRS." },
                                    { title: "Audit & Légal", desc: "Commissariat aux comptes et audits contractuels pour sécuriser vos parties prenantes." },
                                    { title: "Conseil Fiscal", desc: "Optimisation fiscale et assistance lors des contrôles pour protéger votre trésorerie." },
                                    { title: "International", desc: "Accompagnement des investisseurs étrangers et structuration de flux transfrontaliers." }
                                ].map((item, index) => (
                                    <div key={index} className="p-8 border border-neutral-100 bg-white hover-lift text-left flex flex-col h-full">
                                        <div className="w-12 h-12 bg-wwc-lime/10 text-wwc-lime flex items-center justify-center mb-6">
                                            <IconCheck />
                                        </div>
                                        <h3 className="text-xl font-bold text-wwc-grey mb-4 uppercase tracking-tighter">{item.title}</h3>
                                        <p className="text-neutral-500 text-sm leading-relaxed mb-6 flex-grow">{item.desc}</p>
                                        <a href="#" className="text-wwc-lime font-bold text-xs uppercase tracking-widest flex items-center gap-2 hover:gap-4 transition-all">
                                            En savoir plus <span>→</span>
                                        </a>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Valeurs */}
                    <section id="valeurs" className="py-24 bg-wwc-grey text-white px-6">
                        <div className="max-w-7xl mx-auto flex flex-col lg:flex-row gap-20 items-center">
                            <div className="lg:w-1/2 text-left">
                                <h2 className="text-4xl md:text-5xl font-extrabold mb-8 leading-tight">
                                    Pourquoi choisir <br/> <span className="text-wwc-lime italic underline">We Work Consulting ?</span>
                                </h2>
                                <div className="space-y-8">
                                    {[
                                        "Réactivité chirurgicale : Une réponse sous 24h.",
                                        "Expertise biculturelle : Maîtrise des enjeux locaux et globaux.",
                                        "Technologie intégrée : Pilotage de votre data en temps réel.",
                                        "Transparence totale : Honoraires clairs et sans surprises."
                                    ].map((val, i) => (
                                        <div key={i} className="flex items-start gap-4">
                                            <div className="mt-1 text-wwc-lime"><IconCheck /></div>
                                            <p className="text-lg font-medium opacity-90">{val}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="lg:w-1/2 w-full grid grid-cols-2 gap-4">
                                <div className="bg-white/5 aspect-square flex flex-col items-center justify-center border border-white/10">
                                    <span className="text-5xl font-black text-wwc-lime mb-2">+150</span>
                                    <span className="text-xs uppercase font-bold tracking-widest opacity-60">Clients Actifs</span>
                                </div>
                                <div className="bg-white/10 aspect-square flex flex-col items-center justify-center">
                                    <span className="text-5xl font-black text-white mb-2">10+</span>
                                    <span className="text-xs uppercase font-bold tracking-widest opacity-60 text-center">Années d'Expertise</span>
                                </div>
                                <div className="bg-white/10 aspect-square flex flex-col items-center justify-center">
                                    <IconGlobe />
                                    <span className="text-xs uppercase font-bold tracking-widest mt-4 opacity-60 text-center uppercase tracking-tighter">Présence Globale</span>
                                </div>
                                <div className="bg-wwc-lime text-wwc-grey aspect-square flex flex-col items-center justify-center">
                                    <span className="text-4xl font-black mb-2 leading-none text-center italic">Audit <br/> Ready</span>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Simulator */}
                    <section id="simulator" className="py-24 md:py-32 px-6 max-w-5xl mx-auto">
                        <div className="bg-neutral-50 p-10 md:p-20 border border-neutral-200">
                            <div className="text-center mb-16">
                                <h2 className="text-3xl md:text-4xl font-extrabold text-wwc-grey mb-4 italic">Simulateur d'Optimisation</h2>
                                <p className="text-neutral-500 font-medium italic">Estimez vos marges de manœuvre fiscales.</p>
                            </div>
                            
                            <div className="grid md:grid-cols-2 gap-16 items-center">
                                <div className="space-y-10 text-left">
                                    <div>
                                        <div className="flex justify-between text-xs font-black uppercase text-neutral-400 mb-4 tracking-widest">
                                            <span>Chiffre d'Affaires Annuel</span>
                                            <span className="text-wwc-grey font-bold">{revenue.toLocaleString()} €</span>
                                        </div>
                                        <input 
                                            type="range" 
                                            min="100000" 
                                            max="10000000" 
                                            step="100000"
                                            value={revenue}
                                            onChange={(e) => setRevenue(parseInt(e.target.value))}
                                        />
                                    </div>
                                    <div className="p-6 bg-white border-l-4 border-wwc-lime italic text-sm text-neutral-600">
                                        "Une structuration adaptée permet de réduire la pression fiscale de 15% en moyenne."
                                    </div>
                                </div>
                                <div className="bg-wwc-lime p-10 text-wwc-grey text-center shadow-xl">
                                    <h3 className="text-xs font-black uppercase tracking-widest mb-6 opacity-60 tracking-widest">Gain Potentiel Annuel</h3>
                                    <p className="text-5xl md:text-6xl font-black mb-10 tracking-tighter">
                                        {savings.toLocaleString()} €
                                    </p>
                                    <button className="bg-wwc-grey text-white w-full py-4 text-xs font-bold uppercase tracking-widest hover:bg-black transition-all">
                                        Réclamer mon Diagnostic
                                    </button>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="bg-white border-t border-neutral-100 pt-24 pb-12 px-6 text-wwc-grey">
                        <div className="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-16 mb-20 text-left">
                            <div>
                                <div className="flex items-center gap-3 mb-8">
                                    <img src="logowwc.jpg" className="h-10 w-auto object-contain" alt="WWC Logo" />
                                </div>
                                <p className="text-xs text-neutral-500 font-medium leading-relaxed uppercase tracking-[0.2em]">
                                    Immeuble le Grand Large<br/>
                                    Berges du Lac 2, Tunis<br/>
                                    Tunisie
                                </p>
                            </div>
                            <div>
                                <h4 className="font-black text-xs uppercase tracking-[0.3em] mb-8 tracking-widest">Services</h4>
                                <ul className="text-xs text-neutral-500 font-bold space-y-4 uppercase tracking-widest">
                                    <li className="hover:text-wwc-lime cursor-pointer">Expertise Comptable</li>
                                    <li className="hover:text-wwc-lime cursor-pointer">Audit Légal</li>
                                    <li className="hover:text-wwc-lime cursor-pointer">Conseil Fiscal</li>
                                    <li className="hover:text-wwc-lime cursor-pointer">Juridique</li>
                                </ul>
                            </div>
                            <div>
                                <h4 className="font-black text-xs uppercase tracking-[0.3em] mb-8 tracking-widest">Direct</h4>
                                <ul className="text-xs text-neutral-500 font-bold space-y-4 uppercase tracking-widest">
                                    <li>+216 71 000 000</li>
                                    <li>contact@wework-consulting.xyz</li>
                                    <li className="text-wwc-lime cursor-pointer">Prendre RDV en ligne</li>
                                </ul>
                            </div>
                            <div>
                                <h4 className="font-black text-xs uppercase tracking-[0.3em] mb-8 tracking-widest">Newsletter</h4>
                                <div className="flex border-b border-wwc-grey pb-2">
                                    <input type="email" placeholder="Email" className="bg-transparent text-xs uppercase font-bold w-full outline-none" />
                                    <button className="text-wwc-lime font-black">OK</button>
                                </div>
                            </div>
                        </div>
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center pt-12 border-t border-neutral-50 gap-6 text-center">
                            <p className="text-[10px] font-bold text-neutral-400 uppercase tracking-[0.4em]">
                                &copy; 2026 We Work Consulting — Excellence in Every Audit.
                            </p>
                            <div className="flex gap-8 text-[10px] font-bold uppercase tracking-widest text-neutral-400">
                                <a href="#" className="hover:text-wwc-lime">Mentions Légales</a>
                                <a href="#" className="hover:text-wwc-lime">Confidentialité</a>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
