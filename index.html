<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WWC | Tactical Navigation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');
        :root { --neon: #00f2ff; --dark: #020406; }
        
        body { 
            background: var(--dark); 
            color: white; 
            font-family: 'JetBrains Mono', monospace; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        /* Map Styling */
        #map { 
            width: 100%; 
            height: 100%; 
            filter: invert(100%) hue-rotate(180deg) brightness(0.7) contrast(1.2) saturate(0.2);
            background: #000;
        }

        /* UI Elements */
        .glass { 
            background: rgba(5, 10, 15, 0.8); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(0, 242, 255, 0.15); 
        }

        .scanline { 
            width: 100%; 
            height: 100px; 
            background: linear-gradient(0deg, transparent, rgba(0, 242, 255, 0.05), transparent); 
            position: absolute; 
            animation: scan 8s linear infinite; 
            z-index: 2000; 
            pointer-events: none; 
        }

        @keyframes scan { 0% { top: -100px; } 100% { top: 100%; } }

        .marker-pulse {
            width: 12px; height: 12px; background: var(--neon); border-radius: 50%;
            box-shadow: 0 0 20px var(--neon); position: relative;
        }
        .marker-pulse::after {
            content: ''; position: absolute; width: 40px; height: 40px; 
            border: 1px solid var(--neon); border-radius: 50%; left: -14px; top: -14px; 
            animation: ring 2s infinite;
        }
        @keyframes ring { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }

        .leaflet-control-attribution { display: none !important; }
    </style>
</head>
<body class="flex flex-col md:flex-row">
    <div class="scanline"></div>

    <div class="w-full md:w-85 p-6 md:p-10 glass border-b md:border-b-0 md:border-r z-[1000] flex flex-col justify-between order-2 md:order-1">
        <div>
            <div class="flex items-center gap-3 mb-8">
                <div class="w-2 h-2 bg-cyan-500 rounded-full animate-pulse shadow-[0_0_8px_#00f2ff]"></div>
                <span class="text-[9px] font-bold tracking-[0.4em] uppercase text-cyan-400">Security Active</span>
            </div>
            
            <h1 class="text-3xl font-bold tracking-tighter mb-2 italic">WWC_NAV</h1>
            <p class="text-[9px] text-gray-500 mb-10 tracking-widest uppercase font-light">Cabinet Intelligence Interface</p>

            <div class="space-y-6">
                <div class="p-4 bg-white/5 border border-white/5 rounded-2xl">
                    <div class="text-[8px] text-gray-600 uppercase mb-2">Localisation_ID</div>
                    <div class="text-[11px] font-bold text-white tracking-tighter">BERGES_DU_LAC_1.TN</div>
                </div>

                <div class="space-y-4 pt-4">
                    <div class="text-[8px] text-cyan-400 uppercase font-bold tracking-widest">Navigation Principale</div>
                    <button onclick="enterSite()" class="w-full py-5 bg-cyan-500 text-black font-bold text-[10px] tracking-[0.2em] uppercase rounded-2xl hover:bg-white transition-all duration-500 shadow-[0_15px_30px_rgba(0,242,255,0.2)]">
                        Accéder au Site Principal
                    </button>
                </div>
            </div>
        </div>

        <div class="hidden md:block pt-10">
            <div class="p-4 bg-black/40 rounded-xl border border-white/5 text-[7px] text-gray-600 font-mono leading-relaxed">
                > PROTOCOL: SECURE_WWC_2026<br>
                > ENCRYPTION: AES_256_ACTIVE<br>
                > STATUS: READY_FOR_DEPLOYMENT
            </div>
        </div>
    </div>

    <div class="flex-grow relative h-[50vh] md:h-full order-1 md:order-2">
        <div id="map"></div>
        <div class="absolute top-6 right-6 z-[1000] glass px-5 py-2 rounded-full border border-white/10">
            <span id="clock" class="text-[10px] font-bold text-cyan-400">00:00:00</span>
        </div>
    </div>

    <script>
        const target = [36.835418, 10.242075];
        let map;

        function enterSite() {
            // Animation de sortie
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.5s ease';
            
            setTimeout(() => {
                // Direction vers le fichier home.html
                window.location.href = 'home.html';
            }, 500);
        }

        window.addEventListener('DOMContentLoaded', () => {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView(target, 16);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            const customIcon = L.divIcon({
                className: 'custom-marker',
                html: '<div class="marker-pulse"></div>',
                iconSize: [40, 40],
                iconAnchor: [20, 20]
            });
            L.marker(target, { icon: customIcon }).addTo(map);

            setInterval(() => {
                document.getElementById('clock').textContent = new Date().toLocaleTimeString('fr-FR', { hour12: false });
            }, 1000);
        });
    </script>
</body>
</html>
